<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Royaume">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fef9f3">
<title>Le Royaume des Savoirs</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:linear-gradient(180deg,#fef9f3 0%,#fff5e6 100%);color:#2d2018;font-family:'Quicksand',-apple-system,sans-serif;overflow-x:hidden;min-height:100vh;font-weight:500}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#fff5e6}
::-webkit-scrollbar-thumb{background:#fbcb7a;border-radius:4px}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@keyframes float{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-8px) rotate(2deg)}}
@keyframes sparkle{0%,100%{opacity:.6;transform:scale(.9)}50%{opacity:1;transform:scale(1.15)}}
@keyframes confetti{0%{transform:translateY(-100vh) rotate(0)}100%{transform:translateY(100vh) rotate(720deg)}}
@keyframes glow{0%,100%{box-shadow:0 4px 20px rgba(247,160,32,.2)}50%{box-shadow:0 6px 30px rgba(247,160,32,.4)}}
.fade-in{animation:fadeIn .5s ease-out both}
.bounce{animation:bounce 1.5s ease-in-out infinite}
.float{animation:float 3s ease-in-out infinite}
.pulse{animation:pulse 1.2s ease-in-out infinite}
.sparkle-anim{animation:sparkle 2s ease-in-out infinite}
.glow-anim{animation:glow 3s ease-in-out infinite}

/* LAYOUT */
.container{max-width:760px;margin:0 auto;padding:0 16px 80px;position:relative;z-index:10}
.text-center{text-align:center}
.flex-1{flex:1}
.row{display:flex;align-items:center;gap:12px}
.row-between{display:flex;justify-content:space-between;align-items:center;gap:12px}
.gap-2{gap:8px}
.mt-2{margin-top:8px}
.mt-3{margin-top:12px}
.mt-4{margin-top:16px}
.mt-6{margin-top:24px}
.mt-8{margin-top:32px}
.mb-2{margin-bottom:8px}
.mb-4{margin-bottom:16px}
.mb-6{margin-bottom:24px}
.py-6{padding-top:24px;padding-bottom:24px}
.py-8{padding-top:32px;padding-bottom:32px}
.hidden{display:none!important}

/* CARDS - light & friendly */
.card{background:#ffffff;border:2px solid #fde0b0;box-shadow:0 4px 16px rgba(247,160,32,.08),0 1px 3px rgba(0,0,0,.04);border-radius:20px;padding:20px;margin-bottom:16px;transition:all .25s}
.card.clickable{cursor:pointer}
.card.clickable:hover,.card.clickable:active{transform:translateY(-2px) scale(1.01);box-shadow:0 8px 24px rgba(247,160,32,.18)}

/* BUTTONS */
.btn-fire{background:linear-gradient(135deg,#fbbf24,#f7a020,#e8850a);color:#fff;font-weight:700;border:none;cursor:pointer;border-radius:14px;padding:14px 22px;font-size:1.05rem;font-family:'Fredoka',sans-serif;letter-spacing:.02em;transition:all .25s;width:100%;display:block;box-shadow:0 4px 12px rgba(247,160,32,.3)}
.btn-fire:hover,.btn-fire:active{background:linear-gradient(135deg,#fcd34d,#fbbf24,#f7a020);transform:translateY(-2px);box-shadow:0 6px 18px rgba(247,160,32,.4)}
.btn-fire:disabled{opacity:.5;cursor:default}
.btn-stone{background:#ffffff;border:2px solid #fde0b0;color:#7a3f04;cursor:pointer;border-radius:12px;padding:12px 18px;font-size:.9rem;font-family:'Fredoka',sans-serif;font-weight:600;transition:all .25s;width:100%;display:block}
.btn-stone:hover,.btn-stone:active{background:#fff5e6;border-color:#fbbf24;transform:translateY(-1px)}
.btn-small{padding:8px 14px;font-size:.8rem;width:auto;display:inline-block;margin-right:6px;margin-bottom:6px}

/* CHOICE BUTTONS */
.choice-btn{background:#ffffff;border:2px solid #e7d3b1;color:#2d2018;cursor:pointer;border-radius:14px;padding:16px 18px;text-align:left;font-size:1.05rem;font-family:'Quicksand',sans-serif;font-weight:600;transition:all .25s;width:100%;display:block;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.choice-btn:hover:not(:disabled):not(.correct):not(.wrong){border-color:#f7a020;background:#fff8ed;transform:translateY(-2px);box-shadow:0 4px 12px rgba(247,160,32,.15)}
.choice-btn:disabled{cursor:default}
.choice-btn.correct{border-color:#22c55e!important;background:#dcfce7!important;color:#14532d!important}
.choice-btn.wrong{border-color:#ef4444!important;background:#fee2e2!important;color:#991b1b!important;animation:shake .4s ease-in-out}
.choice-letter{color:#f7a020;font-weight:700;margin-right:10px;font-family:'Fredoka',sans-serif}

.choices-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:600px){.choices-grid{grid-template-columns:1fr}}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;text-align:center}
.stat-card{background:#fff8ed;border:1px solid #fde0b0;border-radius:14px;padding:14px 8px}
.stat-val{font-size:1.7rem;font-weight:700;font-family:'Fredoka',sans-serif}
.stat-label{font-size:.7rem;color:#9c6f3a;margin-top:4px;font-weight:600}

.divider{height:2px;background:linear-gradient(90deg,transparent,#fbcb7a,transparent);margin:20px 0;border-radius:2px}
.badge{font-size:.75rem;padding:4px 12px;border-radius:9999px;background:#fff5e6;color:#7a3f04;border:1px solid #fde0b0;font-family:'Fredoka',sans-serif;font-weight:600;display:inline-block}
.badge-cat{background:#ede9fe;color:#5b21b6;border-color:#c4b5fd}
.stars{font-size:.75rem;color:#fbbf24;margin-left:8px}
.progress-track{width:100%;height:8px;border-radius:4px;background:#fde0b0;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,#fbbf24,#f7a020,#e8850a);transition:width .5s}
.timer-track{width:100%;height:10px;border-radius:5px;background:#fde0b0;overflow:hidden;margin-top:4px}
.timer-fill{height:100%;border-radius:5px;transition:width 1s linear}

.fancy-title{font-family:'Fredoka',sans-serif;font-weight:700;margin-bottom:12px}
h2.title{font-family:'Fredoka',sans-serif;font-weight:700;margin-bottom:12px;color:#2d2018}
h3.card-title{font-family:'Fredoka',sans-serif;font-weight:600;margin:0 0 4px;color:#2d2018}
p.sub{font-size:.92rem;color:#7a5a3a;margin:0;font-weight:500}
p.desc{font-size:.78rem;color:#9c6f3a;margin:4px 0 0;font-weight:500}
.arrow{color:#f7a020;font-size:1.6rem;font-weight:bold}

a.detail-link{color:#7c3aed;font-size:.9rem;text-decoration:underline;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;font-weight:600}
a.detail-link:hover{color:#5b21b6}

/* PEDAGO BOX */
.pedago-box{background:linear-gradient(135deg,#fef3c7,#fde68a);border:1px solid #fcd34d;border-radius:14px;padding:14px;margin-top:12px}
.pedago-title{color:#92400e;font-weight:700;font-family:'Fredoka',sans-serif;font-size:.85rem;letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px}
.pedago-step{color:#451a03;margin-bottom:6px;padding-left:10px;border-left:3px solid #f7a020;padding-top:4px;padding-bottom:4px;font-weight:500}

.tip-box{background:linear-gradient(135deg,#dcfce7,#bbf7d0);border:1px solid #86efac;border-radius:14px;padding:14px;margin-top:10px}
.tip-label{color:#14532d;font-weight:700}
.tip-text{color:#166534}

.error-box{background:linear-gradient(135deg,#fee2e2,#fecaca);border:1px solid #f87171;border-radius:14px;padding:14px;margin-top:10px}
.error-label{color:#7f1d1d;font-weight:700}

.recap-item{display:flex;align-items:flex-start;gap:8px;padding:10px 0;border-bottom:1px solid #fde0b0}
.recap-icon{font-size:1.2rem;margin-top:2px}
.recap-q{color:#2d2018;font-size:.88rem;line-height:1.4;font-weight:500}
.recap-answer{color:#15803d;font-size:.78rem;margin-top:4px;font-weight:600}
.recap-scroll{max-height:300px;overflow-y:auto;padding-right:8px}

.btn-row{display:flex;gap:12px;flex-wrap:wrap}
.btn-row>*{flex:1;min-width:140px}

/* HEADER */
header{position:relative;z-index:10;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border-bottom:1px solid #fde0b0}
header h1{font-family:'Fredoka',sans-serif;font-size:clamp(1.2rem,3vw,1.6rem);font-weight:700;color:#7a3f04;letter-spacing:0}
.header-sub{font-size:.7rem;color:#9c6f3a;font-family:'Fredoka',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.header-left{display:flex;align-items:center;gap:10px;cursor:pointer}
footer{position:relative;z-index:10;text-align:center;padding:24px;font-size:.75rem;color:#9c6f3a;font-family:'Fredoka',sans-serif}

/* GAMIFICATION */
.dragon-card{background:linear-gradient(135deg,#fef3c7,#fde68a,#fcd34d);border:2px solid #f7a020;border-radius:24px;padding:22px;text-align:center;position:relative;overflow:hidden;margin-bottom:16px;box-shadow:0 8px 24px rgba(251,191,36,.25)}
.dragon-emoji{font-size:5.5rem;display:inline-block;filter:drop-shadow(0 4px 12px rgba(247,160,32,.3))}
.dragon-name{font-family:'Fredoka',sans-serif;font-size:1.4rem;color:#7a3f04;font-weight:700;margin-top:8px}
.dragon-stage{font-family:'Fredoka',sans-serif;font-size:.8rem;color:#9c6f3a;text-transform:uppercase;letter-spacing:.08em;margin-top:4px;font-weight:600}
.xp-bar-track{width:100%;height:12px;background:rgba(255,255,255,.6);border-radius:6px;overflow:hidden;margin-top:14px;border:1px solid #fde0b0}
.xp-bar-fill{height:100%;background:linear-gradient(90deg,#22c55e,#3b82f6,#8b5cf6);transition:width .6s;border-radius:6px}
.xp-label{font-family:'Fredoka',sans-serif;font-size:.75rem;color:#7a3f04;margin-top:6px;font-weight:600}
.resources-row{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.resource{background:#ffffff;border:1px solid #fde0b0;border-radius:9999px;padding:7px 14px;display:flex;align-items:center;gap:6px;font-family:'Fredoka',sans-serif;font-size:.85rem;color:#7a3f04;font-weight:600;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.resource.xp{background:#ede9fe;border-color:#c4b5fd;color:#5b21b6}
.resource.flame{background:#fef3c7;border-color:#fbbf24;color:#92400e}
.resource.crystal{background:#dbeafe;border-color:#93c5fd;color:#1e40af}

.quest-card{background:linear-gradient(135deg,#ede9fe,#ddd6fe);border:1px solid #c4b5fd;border-radius:16px;padding:14px;margin-bottom:16px}
.quest-title{font-family:'Fredoka',sans-serif;color:#5b21b6;font-size:.8rem;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;font-weight:700}
.quest-desc{color:#2d2018;margin-bottom:10px;font-weight:500}
.quest-progress{font-family:'Fredoka',sans-serif;font-size:.85rem;color:#5b21b6;font-weight:600}
.quest-done{color:#15803d}

.dragonnet-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-top:12px}
.dragonnet-card{background:#fff;border:2px solid #fde0b0;border-radius:16px;padding:14px;text-align:center;transition:all .3s;cursor:pointer}
.dragonnet-card.unlocked{border-color:#f7a020;background:linear-gradient(135deg,#fef3c7,#fde68a);box-shadow:0 4px 12px rgba(247,160,32,.2)}
.dragonnet-card.locked{opacity:.45;filter:grayscale(.6)}
.dragonnet-emoji{font-size:2.6rem;display:block;margin-bottom:6px}
.dragonnet-name{font-family:'Fredoka',sans-serif;font-size:.9rem;color:#7a3f04;font-weight:700}
.dragonnet-elem{font-size:.7rem;color:#9c6f3a;margin-top:2px;font-weight:500}
.dragonnet-unlock{font-size:.72rem;color:#1e40af;margin-top:4px;font-weight:600}

.bar-chart{display:flex;flex-direction:column;gap:10px;margin-top:14px}
.bar-row{display:flex;align-items:center;gap:10px;font-size:.85rem}
.bar-label{width:140px;color:#2d2018;font-size:.85rem;font-weight:600}
.bar-track{flex:1;height:14px;background:#fde0b0;border-radius:7px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:7px;transition:width .8s}
.bar-val{color:#7a3f04;font-weight:700;font-family:'Fredoka';width:48px;text-align:right;font-size:.85rem}

.badge-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:12px}
.badge-card{background:#fff;border:2px solid #fde0b0;border-radius:14px;padding:12px;text-align:center;opacity:.4;transition:all .3s}
.badge-card.unlocked{opacity:1;background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:#f7a020;box-shadow:0 4px 12px rgba(247,160,32,.2)}
.badge-ic{font-size:1.9rem}
.badge-name{font-size:.75rem;color:#7a3f04;margin-top:4px;font-family:'Fredoka';font-weight:700}
.badge-desc{font-size:.65rem;color:#9c6f3a;margin-top:2px;font-weight:500}

.weak-cat{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:linear-gradient(135deg,#fee2e2,#fecaca);border:1px solid #f87171;border-radius:12px;margin-bottom:8px}
.strong-cat{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:linear-gradient(135deg,#dcfce7,#bbf7d0);border:1px solid #86efac;border-radius:12px;margin-bottom:8px}
.parent-btn{background:linear-gradient(135deg,#ede9fe,#ddd6fe);color:#5b21b6;border:1px solid #c4b5fd;padding:12px 18px;border-radius:12px;cursor:pointer;font-family:'Fredoka';font-size:.88rem;font-weight:600;transition:all .25s}
.parent-btn:hover,.parent-btn:active{background:linear-gradient(135deg,#ddd6fe,#c4b5fd);transform:translateY(-1px)}

.session-item{background:#fff;border:1px solid #fde0b0;border-radius:12px;padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.name-prompt{background:#fff;border:2px solid #fde0b0;border-radius:12px;padding:14px;color:#2d2018;font-size:1.1rem;width:100%;font-family:inherit;margin-bottom:12px;font-weight:600;transition:all .2s}
.name-prompt:focus{outline:none;border-color:#f7a020;background:#fff8ed}

/* SUBJECT CARDS */
.subject-card{background:#ffffff;border:3px solid;border-radius:24px;padding:24px;margin-bottom:16px;cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:18px;position:relative;overflow:hidden}
.subject-card:hover,.subject-card:active{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.1)}
.subject-emoji{font-size:3.5rem;flex-shrink:0}
.subject-info{flex:1}
.subject-name{font-family:'Fredoka',sans-serif;font-size:1.3rem;font-weight:700;margin:0}
.subject-desc{font-size:.9rem;color:#7a5a3a;margin-top:4px;font-weight:500}

/* FICHE BILAN */
.fiche-card{background:linear-gradient(135deg,#fff,#fef9f3);border:2px solid #fbbf24;border-radius:20px;padding:24px;margin-bottom:16px;box-shadow:0 6px 20px rgba(247,160,32,.12)}
.fiche-h1{font-family:'Fredoka',sans-serif;color:#7a3f04;font-size:1.5rem;font-weight:700;margin-bottom:8px}
.fiche-intro{color:#451a03;font-size:1.05rem;font-style:italic;margin-bottom:16px;font-weight:500}
.fiche-section{margin-top:18px;padding-top:14px;border-top:2px solid #fde0b0}
.fiche-section h3{font-family:'Fredoka',sans-serif;color:#7a3f04;font-size:1.05rem;margin-bottom:8px;font-weight:700}
.fiche-list{list-style:none;padding:0}
.fiche-list li{padding:6px 0;padding-left:24px;position:relative}
.fiche-list li:before{content:'\u2728';position:absolute;left:0}
.fiche-mini{background:#fff8ed;padding:8px 12px;border-radius:10px;margin-bottom:6px;border-left:3px solid #fbbf24}
.fiche-mini b{color:#7a3f04}
.fiche-anecdote{background:linear-gradient(135deg,#dbeafe,#bfdbfe);padding:12px 16px;border-radius:12px;border-left:3px solid #3b82f6;font-style:italic;color:#1e3a8a;margin-top:14px}
.fiche-retiens{background:linear-gradient(135deg,#fef3c7,#fde68a);padding:14px 18px;border-radius:14px;text-align:center;font-weight:600;color:#7a3f04;margin-top:14px;border:2px solid #fbbf24;font-size:1.05rem}

/* CONFETTI */
.confetti-piece{position:fixed;top:-20px;width:10px;height:10px;animation:confetti 2.5s linear forwards;pointer-events:none;z-index:1000}

.fredoka{font-family:'Fredoka',sans-serif}
</style>
</head>
<body>
<header>
<div class="header-left" id="headerHome">
<span id="backArrow" class="hidden" style="color:#f7a020;font-size:1.4rem;margin-right:4px;font-weight:bold">&#8592;</span>
<h1>\u{1F3F0} Le Royaume des Savoirs</h1>
</div>
<div class="header-sub">Multi-domaine</div>
</header>
<div class="container" id="app"></div>
<div id="toast-area"></div>
<footer>Le Royaume des Savoirs &mdash; Math\u00e9matiques, Culture, Sciences</footer>
<script src="exercises.js"></script>
<script src="game.js"></script>
</body>
</html>
