name: Generate poetry audio (OpenAI TTS)

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Réécraser les MP3 existants ?'
        required: false
        default: 'false'
        type: choice
        options: [false, true]
      voice:
        description: 'Voix (alloy, echo, fable, onyx, nova, shimmer)'
        required: false
        default: 'nova'
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate MP3s
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TTS_VOICE: ${{ inputs.voice }}
          FORCE: ${{ inputs.force == 'true' && '1' || '' }}
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::Le secret OPENAI_API_KEY n'est pas configuré sur ce repo."
            echo "Va dans Settings → Secrets and variables → Actions → New repository secret"
            echo "Nom : OPENAI_API_KEY  /  Valeur : ta clé sk-..."
            exit 1
          fi
          node scripts/generate-audio.mjs
      - name: Commit & push si nouveau audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add audio/ game.js
          if git diff --cached --quiet; then
            echo "Aucun changement, rien à committer."
          else
            git commit -m "audio: génération TTS (workflow auto)"
            git push
          fi
